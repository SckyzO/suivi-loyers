version: 2
updates:
  # Dépendances Python (requirements.txt, requirements-flet.txt à la racine).
  # Répond directement au résidu « chaîne d'approvisionnement non épinglée »
  # de l'audit : les versions sont figées, Dependabot propose les montées.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps

  # Versions des actions GitHub (checkout, setup-python, upload-artifact…).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
