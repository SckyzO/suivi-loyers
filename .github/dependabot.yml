version: 2
updates:
  # Dépendances Python (requirements.txt, requirements-flet.txt à la racine).
  # Répond directement au résidu « chaîne d'approvisionnement non épinglée »
  # de l'audit : les versions sont figées, Dependabot propose les montées.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    ignore:
      # Flet 0.80+ est une réécriture majeure de l'API ; interface_flet.py cible
      # la lignée 0.28.x « classique » (cf. requirements-flet.txt). On autorise
      # seulement les patchs (0.28.x), pas les bumps minor/major automatiques.
      - dependency-name: flet
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  # Versions des actions GitHub (checkout, setup-python, upload-artifact…).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
