name: CI

# Lint + smoke test du moteur sur chaque push/PR. Tourne sous Linux (le moteur
# n'a aucune dépendance à l'interface graphique), donc rapide et testable avec `act`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff==0.15.20

      - name: Lint (ruff)
        run: ruff check generer_suivi_loyers.py interface_flet.py tests

      - name: Smoke test du moteur
        # PYTHONPATH=racine : smoke.py importe le moteur (comme `make test`).
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python tests/smoke.py
