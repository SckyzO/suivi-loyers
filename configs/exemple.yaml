# Exemple « bailleur complet » (tous les modules + documents + régularisation + IRL).
# Sert de base pour les tests ; l'interface graphique produit le même type de config.

# Pré-remplit des loyers reçus de démonstration (statuts colorés, Bilan + tableau de bord
# peuplés). Réservé aux exemples : l'interface ne produit jamais cette clé.
demo: true

# Apparence (facultatif). Thème de couleurs et police ; absents -> « classique » + Tahoma.
# Thèmes : classique | refresh-bleu | denim-rust | monochrome-noir | ocean-deep
theme: ocean-deep
police: Tahoma

bailleur:
  nom: "SCI Les Tilleuls"
  adresse: "12 rue des Lilas, 35000 Rennes"
  tel: "06 12 34 56 78"
  email: "contact@les-tilleuls.fr"
  # Champs facultatifs repris sur les documents (avis d'échéance, mise en demeure).
  mode_paiement: "Virement bancaire"      # imprimé sous l'avis d'échéance
  iban: "FR76 3000 1000 0100 0000 0000 123"
  jour_echeance: "5"                       # « à régler avant le 5 <mois> » sur l'avis
  date_bail: "2023-06-01"                  # référence du bail sur la mise en demeure

periode:
  annee_debut: 2024
  annee_fin: 2026

modules:
  mode_charges: comprises   # comprises | separees | sans
  caf: true
  depot_garantie: true
  documents: true
  tableau_bord: true
  regularisation_charges: true
  irl: true

