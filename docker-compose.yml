# Génération des classeurs via Docker Compose.
#
#   docker compose build
#   docker compose run --rm suivi configs/exemple.yaml exemples
#   docker compose run --rm suivi configs/minimal.yaml exemples
#
# Les fichiers .xlsx sont écrits dans ./exemples (monté en écriture).
services:
  suivi:
    build: .
    image: suivi-loyers:latest
    volumes:
      - ./configs:/app/configs:ro
      - ./exemples:/app/exemples
